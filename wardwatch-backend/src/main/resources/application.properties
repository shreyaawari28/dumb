# =============================================
# WardWatch - Application Configuration
# =============================================

# --- Server ---
server.port=8080

# --- DataSource (PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5433/wardwatch
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Connection Pool ---
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- Bed Cleaning Auto-Release ---
bed.cleaning.duration.minutes=5
bed.cleaning.check.interval.ms=60000
bed.cleaning.alert.minutes=3
queue.discharge.alert.minutes=120
capacity.warning.threshold=2
